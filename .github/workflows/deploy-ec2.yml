name: Microservices CI/CD

on:
  push:
    branches:
      - development

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - order-service
          - products-service
          - tracking-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          cd ${{ matrix.service }}
          echo "Running tests for ${{ matrix.service }}"
          # pytest  (enable if you have tests)

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bookstore-${{ matrix.service }}:latest ./${{ matrix.service }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/bookstore-${{ matrix.service }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            docker pull ${{ secrets.DOCKER_USERNAME }}/bookstore-auth-service:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bookstore-order-service:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bookstore-products-service:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bookstore-tracking-service:latest

            docker stop auth-service || true
            docker stop order-service || true
            docker stop products-service || true
            docker stop tracking-service || true

            docker rm auth-service || true
            docker rm order-service || true
            docker rm products-service || true
            docker rm tracking-service || true

            docker run -d --name auth-service -p 8001:8000 ${{ secrets.DOCKER_USERNAME }}/bookstore-auth-service:latest
            docker run -d --name order-service -p 8002:8000 ${{ secrets.DOCKER_USERNAME }}/bookstore-order-service:latest
            docker run -d --name products-service -p 8003:8000 ${{ secrets.DOCKER_USERNAME }}/bookstore-products-service:latest
            docker run -d --name tracking-service -p 8004:8000 ${{ secrets.DOCKER_USERNAME }}/bookstore-tracking-service:latest













