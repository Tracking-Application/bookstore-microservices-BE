name: Backend CI/CD

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:

  test-build-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    # - name: Run Tests
    #   run: |
    #     cd backend
    #     pytest

    - name: Create Artifact
      run: |
        tar -czf backend-artifact.tar.gz backend

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-artifact
        path: backend-artifact.tar.gz

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/bookstore-backend:latest ./backend

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/bookstore-backend:latest

  deploy:
    needs: test-build-publish
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |

          docker stop bookstore-backend || true
          docker rm bookstore-backend || true

          docker pull ${{ secrets.DOCKER_USERNAME }}/bookstore-backend:latest

          docker run -d \
            --name bookstore-backend \
            -p 8000:8000 \
            --restart always \
            ${{ secrets.DOCKER_USERNAME }}/bookstore-backend:latest














